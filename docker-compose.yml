version: "3.9"

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./backend/prompts:/app/prompts
    environment:
      - DATABASE_URL=sqlite:///data/zawjati.db
      - LLM_API_KEY=${LLM_API_KEY}
    restart: unless-stopped

