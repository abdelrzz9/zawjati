name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov mypy ruff
      - name: Lint (ruff)
        run: ruff check .
      - name: Type check (mypy)
        run: mypy app --ignore-missing-imports
      - name: Test with coverage
        run: |
          cd ..
          python -m pytest tests/ -v --cov=backend.app --cov-report=xml:coverage.xml --cov-report=html
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: coverage.xml
      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        with:
          name: backend-htmlcov
          path: htmlcov/

  flutter:
    name: Flutter
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/mobile
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.32.0"
          channel: "stable"
          cache: true
      - name: Get dependencies
        run: flutter pub get
      - name: Check formatting
        run: dart format --set-exit-if-changed .
      - name: Analyze
        run: flutter analyze
      - name: Run tests with coverage
        run: |
          flutter test --coverage
          flutter test --machine > test-results.json || true
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: flutter-coverage
          path: frontend/mobile/coverage/

  nextjs:
    name: Next.js
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/web/package.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Type check
        run: npx tsc --noEmit
      - name: Run tests
        run: npx vitest run --coverage
      - name: Build
        run: npm run build
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: web-coverage
          path: frontend/web/coverage/

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Audit npm dependencies
        working-directory: frontend/web
        run: npm audit --audit-level=high || true
      - name: Check Python dependencies
        working-directory: backend
        run: |
          pip install pip-audit
          pip-audit
      - name: Secret scanning
        uses: trufflesecurity/trufflehog@v3
        with:
          extra_args: --results=verified,unknown --fail

  merge-check:
    name: Merge Gate
    needs: [backend, flutter, nextjs, security]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - run: |
          echo "Backend: ${{ needs.backend.result }}"
          echo "Flutter: ${{ needs.flutter.result }}"
          echo "Next.js: ${{ needs.nextjs.result }}"
          echo "Security: ${{ needs.security.result }}"
          if [ "${{ needs.backend.result }}" = "failure" ] || \
             [ "${{ needs.flutter.result }}" = "failure" ] || \
             [ "${{ needs.nextjs.result }}" = "failure" ] || \
             [ "${{ needs.security.result }}" = "failure" ]; then
            exit 1
          fi
