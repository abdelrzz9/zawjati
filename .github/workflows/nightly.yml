name: Nightly

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  dependency-audit:
    name: Full Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Python audit
        working-directory: backend
        run: |
          pip install pip-audit safety
          pip-audit -r requirements.txt
          safety check -r requirements.txt || true
      - name: npm audit
        working-directory: frontend/web
        run: npm audit --audit-level=moderate

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright
        run: npx playwright install chromium --with-deps
      - name: Run E2E tests
        run: npx playwright test
      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/web/playwright-report/

  performance:
    name: Performance Benchmark
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Start backend
        working-directory: backend
        run: |
          pip install -r requirements.txt
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          sleep 3
      - name: Run benchmarks
        run: |
          pip install locust
          locust --headless -u 10 -r 1 --run-time 30s --host http://localhost:8000 -f /dev/null || true
      - name: Check health
        run: curl -f http://localhost:8000/health || echo "Health check failed"
