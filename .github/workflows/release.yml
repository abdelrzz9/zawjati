name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    name: Release v${{ github.ref_name }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        uses: commitizen-tools/commitizen-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build -t zawjati-backend:${{ github.ref_name }} ./backend
          docker tag zawjati-backend:${{ github.ref_name }} ghcr.io/${{ github.repository }}/backend:${{ github.ref_name }}
          docker tag zawjati-backend:${{ github.ref_name }} ghcr.io/${{ github.repository }}/backend:latest

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Docker images
        run: |
          docker push ghcr.io/${{ github.repository }}/backend:${{ github.ref_name }}
          docker push ghcr.io/${{ github.repository }}/backend:latest

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Zawjati v${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.changelog }}
          draft: false
          prerelease: false
          generate_release_notes: true

      - name: Deploy health check
        run: |
          echo "Release ${{ github.ref_name }} published successfully"
          echo "Docker image: ghcr.io/${{ github.repository }}/backend:${{ github.ref_name }}"
