name: zawjati_mobile
description: "Zawjati AI Companion - Flutter mobile application"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # Architecture
  bloc: ^9.1.1
  dartz: ^0.10.1
  equatable: ^2.0.8
  flutter_bloc: ^9.1.1
  get_it: ^9.2.1
  injectable: ^2.5.0

  # Networking
  http: ^1.3.0
  dio: ^5.8.0+1
  internet_connection_checker_plus: ^2.9.1+2
  connectivity_plus: ^7.0.0

  # Storage
  shared_preferences: ^2.5.4
  flutter_secure_storage: ^10.0.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  cached_network_image: ^3.4.1

  # Navigation
  go_router: ^17.1.0
  app_links: ^7.0.0

  # UI
  google_fonts: ^8.0.2
  cupertino_icons: ^1.0.8
  photo_view: ^0.15.0
  shimmer: ^3.0.0
  flutter_markdown: ^0.7.6+2
  flutter_highlight: ^0.7.0
  highlight: ^0.7.0
  flutter_svg: ^2.0.17
  lottie: ^3.3.1
  flutter_animate: ^4.5.2

  # Auth
  google_sign_in: ^7.2.0
  sign_in_with_apple: ^8.1.0
  local_auth: ^2.3.0

  # Voice & Media
  image_picker: ^1.2.1
  http_parser: ^4.1.2
  path: ^1.9.1
  flutter_image_compress: ^2.4.0
  path_provider: ^2.1.5
  record: ^5.2.0
  audioplayers: ^6.1.0
  speech_to_text: ^7.0.0
  text_to_speech: ^0.2.3

  # Chat
  web_socket_channel: ^3.0.2
  uuid: ^4.5.3

  # Notifications
  firebase_core: ^4.6.0
  firebase_messaging: ^16.1.3
  flutter_local_notifications: ^21.0.0

  # Utilities
  flutter_dotenv: ^6.0.0
  crypto: ^3.0.3
  device_info_plus: ^12.3.0
  package_info_plus: ^8.1.0
  intl: ^0.20.2
  url_launcher: ^6.3.1
  permission_handler: ^11.3.1
  file_picker: ^9.2.2
  share_plus: ^10.1.4

  # Serialization
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # Hooks
  flutter_hooks: ^0.21.0
  markdown: ^7.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  freezed: ^3.0.0
  json_serializable: ^6.9.0
  injectable_generator: ^2.7.0
  build_runner: ^2.4.0
  mocktail: ^1.0.5
  bloc_test: ^10.0.0
  integration_test:
    sdk: flutter
  network_info_plus: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - .env
